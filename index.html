<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="MotoNeuro Dynamics · Coming Soon">
    <title>MotoNeuro Dynamics · Coming Soon</title>
    <style>
      :root {
        --ink: #f4f8fb;
        --muted: rgba(244, 248, 251, 0.86);
        --cyan: #40f0ed;
        --blue: #1f8cff;
        --shadow: rgba(0, 0, 0, 0.62);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        min-height: 100vh;
        min-height: 100svh;
        overflow-x: hidden;
        background: #020406;
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body::before,
      body::after {
        position: fixed;
        inset: 0;
        content: "";
      }

      body::before {
        z-index: -2;
        background-image: url("assets/cover-bg.png");
        background-position: center;
        background-size: cover;
        filter: saturate(0.9) contrast(1.06);
      }

      body::after {
        z-index: -1;
        background:
          radial-gradient(circle at 72% 44%, rgba(64, 240, 237, 0.12), transparent 34%),
          linear-gradient(90deg, rgba(0, 0, 0, 0.9) 0%, rgba(0, 0, 0, 0.72) 31%, rgba(0, 0, 0, 0.34) 58%, rgba(0, 0, 0, 0.12) 100%),
          linear-gradient(180deg, rgba(0, 0, 0, 0.48) 0%, transparent 38%, rgba(0, 0, 0, 0.72) 100%);
      }

      .hero {
        position: relative;
        display: grid;
        grid-template-rows: minmax(108px, 0.72fr) auto minmax(92px, 0.52fr);
        min-height: 100vh;
        min-height: 100svh;
        padding: clamp(28px, 4vw, 64px);
      }

      .logo {
        position: absolute;
        top: clamp(24px, 4vw, 56px);
        left: clamp(28px, 4vw, 64px);
        width: clamp(132px, 12vw, 196px);
        height: auto;
        opacity: 0.94;
        filter: drop-shadow(0 18px 32px var(--shadow));
      }

      .content {
        grid-row: 2;
        align-self: center;
        width: min(980px, 88vw);
      }

      h1 {
        margin: 0;
        max-width: 980px;
        color: var(--ink);
        font-size: clamp(3.2rem, 6vw, 6.75rem);
        font-weight: 500;
        letter-spacing: 0;
        line-height: 0.96;
        text-wrap: balance;
        text-shadow: 0 28px 70px rgba(0, 0, 0, 0.7);
      }

      .accent {
        color: var(--cyan);
      }

      .blue {
        color: var(--blue);
        text-shadow:
          0 0 24px rgba(31, 140, 255, 0.28),
          0 28px 70px rgba(0, 0, 0, 0.78);
      }

      .subline {
        position: absolute;
        right: clamp(28px, 4vw, 64px);
        bottom: clamp(42px, 5vw, 82px);
        margin: 0;
        color: var(--muted);
        font-size: clamp(1rem, 1.36vw, 1.38rem);
        font-weight: 400;
        letter-spacing: 0.045em;
        text-shadow: 0 18px 48px rgba(0, 0, 0, 0.82);
      }

      @media (max-height: 720px) and (min-width: 761px) {
        .hero {
          min-height: 720px;
          grid-template-rows: minmax(120px, 0.58fr) auto minmax(104px, 0.48fr);
        }

        .logo {
          width: clamp(124px, 10vw, 172px);
        }

        h1 {
          font-size: clamp(3rem, 5.25vw, 5.9rem);
        }
      }

      @media (max-width: 760px) {
        body {
          overflow: auto;
        }

        body::before {
          background-position: 62% center;
        }

        body::after {
          background:
            linear-gradient(90deg, rgba(0, 0, 0, 0.9) 0%, rgba(0, 0, 0, 0.68) 62%, rgba(0, 0, 0, 0.24) 100%),
            linear-gradient(180deg, rgba(0, 0, 0, 0.56) 0%, transparent 38%, rgba(0, 0, 0, 0.86) 100%);
        }

        .hero {
          grid-template-rows: minmax(116px, 0.64fr) auto minmax(118px, 0.58fr);
          padding: 28px;
        }

        .logo {
          top: 28px;
          left: 28px;
          width: min(150px, 42vw);
        }

        .content {
          width: min(520px, 100%);
        }

        h1 {
          font-size: clamp(2.85rem, 13vw, 5rem);
          line-height: 0.98;
        }

        .subline {
          right: auto;
          left: 28px;
          bottom: 42px;
          max-width: calc(100vw - 56px);
          font-size: clamp(0.96rem, 4vw, 1.12rem);
          line-height: 1.45;
        }
      }

      @media (max-width: 420px) {
        h1 {
          font-size: clamp(2.52rem, 12.4vw, 3.65rem);
        }
      }
    </style>
  </head>
  <body>
    <main class="hero" aria-label="MotoNeuro Dynamics coming soon">
      <img
        class="logo"
        src="assets/for_dark_background_logo_transparent.png"
        alt="MotoNeuro Dynamics"
      >
      <section class="content" aria-labelledby="headline">
        <h1 id="headline">
          The next interface<br>
          between <span class="blue">ROBOTICS</span><br>
          and <span class="accent">RECOVERY.</span>
        </h1>
      </section>
      <p class="subline">MotoNeuro Dynamics · Coming Soon</p>
    </main>
  </body>
</html>
